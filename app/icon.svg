<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="top-face" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFB6FF"/>
      <stop offset="100%" stop-color="#D56CFF"/>
    </linearGradient>
    <linearGradient id="front-left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C75DFF"/>
      <stop offset="100%" stop-color="#8E2FE5"/>
    </linearGradient>
    <linearGradient id="front-right" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6521A8"/>
      <stop offset="100%" stop-color="#3B0F7D"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#09060F"/>
  <!-- Top face (light pink-purple) -->
  <polygon points="32,8 52,20 32,30 12,20" fill="url(#top-face)"/>
  <!-- Front-left face (medium purple) -->
  <polygon points="12,20 32,30 32,52 12,40" fill="url(#front-left)"/>
  <!-- Front-right face (dark purple) -->
  <polygon points="52,20 52,40 32,52 32,30" fill="url(#front-right)"/>
  <!-- Edge highlight lines for 3D depth -->
  <line x1="32" y1="8" x2="32" y2="30" stroke="rgba(255,242,255,0.18)" stroke-width="0.6"/>
  <line x1="32" y1="30" x2="32" y2="52" stroke="rgba(0,0,0,0.2)" stroke-width="0.6"/>
</svg>
